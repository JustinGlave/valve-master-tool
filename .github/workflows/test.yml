name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unittest:
    name: unittest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run validation + updater unit tests
        run: python -m unittest discover -s tests -v

      - name: Run baseline self-test
        run: |
          python -c "from phoenix_master_backend import run_baseline_debug_benchmark; print(run_baseline_debug_benchmark())"
